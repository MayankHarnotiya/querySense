services:
  postgres:
    image: postgres:16
    container_name: querysense-postgres
    environment:
      POSTGRES_DB: querysense
      POSTGRES_USER: querysense
      POSTGRES_PASSWORD: querysense
    ports:
      - "5440:5432"
    volumes:
      - querysense-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: querysense-redis
    ports:
      - "6379:6379"

volumes:
  querysense-pgdata: